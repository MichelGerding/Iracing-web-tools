<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>iRacing Tools</title>

    <link rel="stylesheet" href="stylesheets/lib.css"/>
    <style>

        /* GRID */
        #tool-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 14px;

            width: max-content !important;
            align-content: start;
        }

        tool-card {
            display: block;
            width: 100%;
            height: 100%;
        }

    </style>
</head>

<body>

<header>
    <div>
        <h1>iRacing Telemetry Tools</h1>
        <span>A collection of tools to work with iRacing telemetry locally in the browser</span>
    </div>
</header>


<main>
    <aside class="sidebar">
        <div style="margin-top: auto; display: flex; flex-direction: column; gap: 8px;">
            <p class="copyright">
                © 2026, Michel Gerding, licenced under
                <a href="https://github.com/MichelGerding/Iracing-web-telemetry-exporter/blob/main/LICENSE">GPL3</a>
            </p>
        </div>
    </aside>
    <div class="content">
        <div id="tool-grid">
            <tool-card
                    name="IBT Converter"
                    description="Parse .ibt telemetry files and export channels to Garage 61 compatible CSV."
                    href="/modules/ibt_converter"
                    badge="ready"
            ></tool-card>

            <tool-card
                    name="Pace Visualizer"
                    description="Visualize your tire deg and pace progression over a stint"
                    href="/modules/pace_visualizer"
                    badge="ready"
            ></tool-card>
        </div>
    </div>
</main>

<script src="js/components/ToolCard/toolcard.js"></script>
</body>
</html>
